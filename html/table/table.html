<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags e atributos do elemento table</title>
</head>
<body>
    <table>
        <thead>
            <tr>
                <td>Nome</td>
                <td>Sobrenome</td>
                <td>Idade</td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Gideão</td>
                <td>Ferreira</td>
                <td>41</td>
            </tr>
            <tr>
                <td>Marcus Vinicius</td>
                <td>Santos</td>
                <td>78</td>
            </tr>
            <tr>
                <td>Maria</td>
                <td>Fernandes</td>
                <td>48</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
